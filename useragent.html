<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0, user-scalable=yes" />
        <title>User Agent</title>
        <!-- The latest version of Tecton can be found at tecton.q2developer.com -->
        
        <script>
          document.addEventListener('DOMContentLoaded', function() {
              const userAgent = window.navigator.userAgent;
              document.querySelector('#ua').textContent = userAgent;
              document.querySelector('#useragent').value = userAgent;
          });
        </script>
    </head>
    <body data-tecton-module>
        <div>This is userAgent</div>
        <div id="ua">This is userAgent</div>
        <input id="useragent"></input>
    </body>
</html>
