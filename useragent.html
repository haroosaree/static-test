<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0, user-scalable=yes" />
        <title>User Agent</title>
        <!-- The latest version of Tecton can be found at tecton.q2developer.com -->
        
        <script>
           function getBrowserInfo() {
                const userAgent = navigator.userAgent;
                let name = 'Unknown';
                let version = 'Unknown';
            
                // Detect platform
                const isMobileDevice = /Android|iPhone|iPad|iPod/i.test(userAgent) || userAgent.includes(' iOS/');
                const platform = isMobileDevice ? 'mobile' : 'desktop';
            
                // Detect context — app (WebView) vs standalone browser
                let context = 'browser';
                if (isMobileDevice) {
                    const isAndroidWebView = userAgent.includes('; wv)');
                    const isIOSDevice = /iPhone|iPad|iPod/.test(userAgent) || userAgent.includes(' iOS/');
                    const isIOSWebView = isIOSDevice && !userAgent.includes('Safari');
                    if (isAndroidWebView || isIOSWebView) {
                        context = 'app';
                    }
                }
            
                // Detect browser name and version — check mobile-specific patterns first
                if (userAgent.includes(' iPhone OS') && !userAgent.includes('Safari')) {
                    // iOS app WebView — no "Safari" token in userAgent
                    name = 'Safari';
                    version = userAgent.split(' iPhone OS')[1].trim().split(/\s/)[0].replaceAll('_', '.');
                } else if (userAgent.includes(' iOS/')) {
                    // Alternate iOS app userAgent format (e.g. ngam-ios/26.5.0.107 arm64 iOS/26.4 CFNetwork/1.0 Darwin/25.4.0)
                    name = 'Safari';
                    version = userAgent.split(' iOS/')[1].split(/\s/)[0];
                } else if (userAgent.includes('Edg')) {
                    name = 'Edge';
                    const match = userAgent.match(/Edg\/(\d+(?:\.\d+)+)/);
                    if (match && match[1]) {
                        version = match[1];
                    }
                } else if (userAgent.includes('Firefox')) {
                    name = 'Firefox';
                    const match = userAgent.match(/Firefox\/(\d+\.\d+)/);
                    if (match && match[1]) {
                        version = match[1];
                    }
                } else if (userAgent.includes('Chrome')) {
                    name = 'Chrome';
                    const match = userAgent.match(/Chrome\/(\d+\.\d+\.\d+\.\d+)/);
                    if (match && match[1]) {
                        version = match[1];
                    }
                } else if (userAgent.includes('Safari')) {
                    name = 'Safari';
                    const match = userAgent.match(/Version\/(\d+(?:\.\d+)+)/);
                    if (match && match[1]) {
                        version = match[1];
                    }
                }
            
                return { name, version, platform, context };
            } 
          document.addEventListener('DOMContentLoaded', function() {
              const userAgent = window.navigator.userAgent;
              document.querySelector('#ua').textContent = userAgent;
              document.querySelector('#useragent').value = userAgent;
              const { name, version, platform, context } = getBrowserInfo();
              document.querySelector('#b_name').textContent = `Name: ${name}`;
              document.querySelector('#b_version').textContent = `Version: ${version}`;
              document.querySelector('#b_platform').textContent = `Platform: ${platform}`;
              document.querySelector('#b_context').textContent = `Context: ${context}`;
          });
        </script>
    </head>
    <body data-tecton-module>
        <div>This is userAgent</div>
        <div id="ua">This is userAgent</div>
        <textarea style="width: 300px; height: 80px" id="useragent"></input>
        <div id="b_name">This is userAgent</div>
        <div id="b_version">This is userAgent</div>
        <div id="b_platform">This is userAgent</div>
        <div id="b_context">This is userAgent</div>
    </body>
</html>
